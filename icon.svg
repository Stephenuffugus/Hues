<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="seg0" gradientUnits="userSpaceOnUse" x1="256" y1="49" x2="256" y2="256">
      <stop offset="0" stop-color="#ff2d2d"/><stop offset="1" stop-color="#ff2d2d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="#0a0a0c"/>
  <!-- full-spectrum hue ring via conic gradient (SVG2; falls back to dark on old renderers) -->
  <foreignObject x="0" y="0" width="512" height="512">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:512px;height:512px;display:flex;align-items:center;justify-content:center;background:#0a0a0c">
      <div style="width:410px;height:410px;border-radius:50%;background:conic-gradient(from 0deg,#ff2d2d,#ffd24d,#4dff66,#4dffe1,#4d8aff,#b04dff,#ff2d2d);
        -webkit-mask:radial-gradient(circle,transparent 0 130px,#000 132px);mask:radial-gradient(circle,transparent 0 130px,#000 132px)"></div>
    </div>
  </foreignObject>
  <!-- center matched swatch -->
  <circle cx="256" cy="256" r="84" fill="#a26ee8"/>
</svg>
